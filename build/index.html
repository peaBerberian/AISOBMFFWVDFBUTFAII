<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta
    name="description"
    content="Inspect MP4 and ISOBMFF files directly in your browser. View box trees, parsed metadata fields, byte offsets, box sizes, and fragmented MP4 segment structure without uploading files."
  >
  <link rel="canonical" href="https://peaberberian.github.io/AISOBMFFWVDFBUTFAII/">
	<link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="MP4 Box Inspector - ISOBMFF Analyzer">
  <meta
    property="og:description"
    content="Inspect MP4 and ISOBMFF files locally in your browser. View box trees, parsed metadata, offsets, sizes, and fragmented MP4 segment structure."
  >
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://peaberberian.github.io/AISOBMFFWVDFBUTFAII/">
  <link rel="stylesheet" href="style.css" media="screen">
  <title>MP4 Box Inspector - ISOBMFF / Fragmented MP4 Analyzer</title>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MP4 Box Inspector",
      "alternateName": "ISOBMFF Inspector",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "description": "Browser-based MP4 and ISOBMFF inspector for viewing box trees, parsed metadata fields, offsets, sizes, and fragmented MP4 segment structure.",
      "url": "https://peaberberian.github.io/AISOBMFFWVDFBUTFAII/",
      "codeRepository": "https://github.com/peaBerberian/AISOBMFFWVDFBUTFAII",
      "isAccessibleForFree": true
    }
  </script>
</head>
<body>
  <header class="project-header">
    <h1 id="title">MP4 Box Inspector</h1>
    <nav class="project-links" aria-label="Project links">
      <a
        class="github-link"
        href="https://github.com/peaBerberian/AISOBMFFWVDFBUTFAII"
        target="_blank"
        rel="noreferrer"
      >GitHub</a>
      <a
        class="github-link"
        href="https://github.com/peaBerberian/AISOBMFFWVDFBUTFAII"
        target="_blank"
        rel="noreferrer"
        aria-label="Star AISOBMFFWVDFBUTFAII on GitHub"
      >
        <span aria-hidden="true">★</span>
        <span>Star</span>
        <span id="github-stars" class="github-stars-count" hidden></span>
      </a>
    </nav>
  </header>
  <p class="app-intro">
  This page lets you inspect MP4, fragmented MP4, and ISOBMFF boxes locally in your browser.<br>
  Neither files nor metadata are sent to a server, everything stays on your computer.
  </p>
  <div id="selection" role="group" aria-label="Choose an MP4 source">
    <div id="choices-local-segment" class="choices-element choices-input">
      <label class="choice-label" for="file-input">
        Local file <span class="drop-hint">drop anywhere</span>
      </label>
      <input type="file" id="file-input" name="file">
    </div>
    <div id="choices-separator" class="choices-element choices-separator">or</div>
    <div id="choices-url-segment" class="choices-element choices-input">
      <label class="choice-label" for="url-input">Remote URL</label>
      <div class="url-entry">
        <input id="url-input" type="url" name="url" placeholder="https://example.com/video.mp4">
        <button type="button" id="url-button">Inspect</button>
      </div>
    </div>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <div id="status-row">
    <div id="status-line"></div>
    <button type="button" id="progress-cancel-button" aria-hidden="true" tabindex="-1">cancel</button>
  </div>
  <div id="results">
    <div id="tabs" hidden>
      <button type="button" class="tab active" data-tab="boxes">box tree</button>
      <button  type="button"class="tab" data-tab="sizes">box sizes</button>
    </div>
    <div id="tab-boxes" class="tab-panel active">
      <div id="file-description"></div>
    </div>
    <div id="tab-sizes" class="tab-panel">
      <div id="size-chart"></div>
    </div>
  </div>
  <div id="drop-overlay" class="drop-overlay" hidden>
    <div class="drop-overlay-message">Drop anywhere to inspect</div>
  </div>
  <script type="module" src="./aisobmffwvdfbutfaii.js" charset="utf-8"></script>
</body>
</html>
